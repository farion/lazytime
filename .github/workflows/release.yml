name: Build and release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  prepare_release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: Automated build for tag ${{ github.ref_name }}
          draft: false
          prerelease: false

  build-linux:
    name: Build (linux)
    runs-on: ubuntu-latest
    needs: prepare_release
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            ruby \
            ruby-dev \
            build-essential \
            rpm \
            pkg-config

      - name: Install fpm
        run: sudo gem install --no-document fpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set version from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          P12_PASSWORD="lazytime-build"
          VERSION="$VERSION" python3 - <<'PY'
          import os
          import pathlib
          import re

          path = pathlib.Path("Cargo.toml")
          text = path.read_text(encoding="utf-8")
          version = os.environ["VERSION"]
          pattern = r'(?ms)(^\[package\]\s*\n(?:.*?\n)*?^version\s*=\s*")[^"]+(")'
          updated, count = re.subn(pattern, rf'\g<1>{version}\g<2>', text, count=1)
          if count != 1:
              raise SystemExit("failed to update [package].version in Cargo.toml")
          path.write_text(updated, encoding="utf-8")
          PY

      - name: Build release (linux full)
        run: cargo build --release --features "backend-sway backend-linux ipc-unix popup-ui"

      - name: Package (tar.gz)
        run: |
          mkdir -p dist
          cp target/release/lazytime dist/lazytime
          tar -C dist -czf lazytime-${{ github.ref_name }}-linux-x86_64-full.tar.gz lazytime

      - name: Package (deb/rpm)
        run: |
          chmod +x tools/package-deb.sh tools/package-rpm.sh
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          tools/package-deb.sh target/release/lazytime "$VERSION" x86_64 full dist
          tools/package-rpm.sh target/release/lazytime "$VERSION" x86_64 full dist

      - name: Upload linux asset to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          gh release upload "${{ github.ref_name }}" "lazytime-${{ github.ref_name }}-linux-x86_64-full.tar.gz" --clobber
          gh release upload "${{ github.ref_name }}" "dist/lazytime-${VERSION}-linux-x86_64-full.deb" --clobber
          gh release upload "${{ github.ref_name }}" "dist/lazytime-${VERSION}-linux-x86_64-full.rpm" --clobber

  build-windows:
    name: Build (windows)
    runs-on: windows-latest
    needs: prepare_release
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set version from tag
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $lines = Get-Content Cargo.toml
          $inPackage = $false
          $updated = $false
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match '^\[package\]\s*$') {
              $inPackage = $true
              continue
            }
            if ($inPackage -and $lines[$i] -match '^\[.+\]\s*$') {
              break
            }
            if ($inPackage -and $lines[$i] -match '^version\s*=') {
              $lines[$i] = "version = `"$version`""
              $updated = $true
              break
            }
          }
          if (-not $updated) {
            throw "failed to update [package].version in Cargo.toml"
          }
          Set-Content Cargo.toml $lines

      - name: Build release (windows)
        run: cargo build --release --no-default-features --features "backend-windows ipc-tcp popup-ui"

      - name: Sign executable (self-signed)
        shell: powershell
        run: |
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=LazyTime Self Signed" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -HashAlgorithm SHA256 `
            -Provider "Microsoft Enhanced RSA and AES Cryptographic Provider" `
            -KeySpec Signature

          Set-AuthenticodeSignature `
            -FilePath target\release\lazytime.exe `
            -Certificate $cert `
            -HashAlgorithm SHA256 | Out-Null

          $signature = Get-AuthenticodeSignature target\release\lazytime.exe

          if ($signature.Status -notin @('Valid', 'NotTrusted')) {
            throw "code signing failed with status: $($signature.Status); message: $($signature.StatusMessage)"
          }

          $signature | Format-List Status, StatusMessage, SignerCertificate

      - name: Package (zip)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item -Path target\release\lazytime.exe -Destination dist\lazytime.exe
          Compress-Archive -Path dist\lazytime.exe -DestinationPath lazytime-${{ github.ref_name }}-windows-x86_64.zip

      - name: Upload windows asset to GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" "lazytime-${{ github.ref_name }}-windows-x86_64.zip" --clobber

  build-macos:
    name: Build (macos)
    runs-on: macos-14
    needs: prepare_release
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set version from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          VERSION="$VERSION" python3 - <<'PY'
          import os
          import pathlib
          import re

          path = pathlib.Path("Cargo.toml")
          text = path.read_text(encoding="utf-8")
          version = os.environ["VERSION"]
          pattern = r'(?ms)(^\[package\]\s*\n(?:.*?\n)*?^version\s*=\s*")[^"]+(")'
          updated, count = re.subn(pattern, rf'\g<1>{version}\g<2>', text, count=1)
          if count != 1:
              raise SystemExit("failed to update [package].version in Cargo.toml")
          path.write_text(updated, encoding="utf-8")
          PY

      - name: Build release (macos)
        run: cargo build --release --no-default-features --features "backend-macos ipc-tcp popup-ui"

      - name: Package (tar.gz)
        run: |
          mkdir -p dist
          cp target/release/lazytime dist/lazytime
          tar -C dist -czf lazytime-${{ github.ref_name }}-macos-aarch64.tar.gz lazytime

      - name: Package (dmg)
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          mkdir -p .build/certs
          cat > .build/certs/openssl-codesign.cnf <<'EOF'
          [ req ]
          default_bits       = 2048
          distinguished_name = req_distinguished_name
          x509_extensions    = v3_req
          prompt             = no

          [ req_distinguished_name ]
          CN = LazyTime Self Signed

          [ v3_req ]
          keyUsage = critical, digitalSignature
          extendedKeyUsage = codeSigning
          basicConstraints = critical, CA:false
          subjectKeyIdentifier = hash
          authorityKeyIdentifier = keyid,issuer
          EOF

          openssl req -new -newkey rsa:2048 -nodes \
            -keyout .build/certs/lazytime-sign.key \
            -x509 -days 3650 \
            -out .build/certs/lazytime-sign.crt \
            -config .build/certs/openssl-codesign.cnf

          openssl pkcs12 -export \
            -inkey .build/certs/lazytime-sign.key \
            -in .build/certs/lazytime-sign.crt \
            -out .build/certs/lazytime-sign.p12 \
            -passout "pass:${P12_PASSWORD}"

          security create-keychain -p "" lazytime-build.keychain
          security unlock-keychain -p "" lazytime-build.keychain
          security import .build/certs/lazytime-sign.p12 -k lazytime-build.keychain -P "${P12_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" lazytime-build.keychain
          security list-keychains -s lazytime-build.keychain login.keychain

          chmod +x tools/package-macos.sh
          tools/package-macos.sh target/release/lazytime "$VERSION" dist "LazyTime Self Signed"
          mv "dist/LazyTime-${VERSION}.dmg" "lazytime-${{ github.ref_name }}-macos-aarch64.dmg"

      - name: Upload macOS asset to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "lazytime-${{ github.ref_name }}-macos-aarch64.tar.gz" --clobber
          gh release upload "${{ github.ref_name }}" "lazytime-${{ github.ref_name }}-macos-aarch64.dmg" --clobber
